<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOM Assignment</title>

<style>
    body{
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 50px;
    }

    .container{
        width: 400px;
        margin: auto;
    }

    .boxes{
        display: flex;
        justify-content: center;
        gap: 10px;
        margin: 20px 0;
    }

    .box{
        width: 50px;
        height: 50px;
        border: none;
        cursor: pointer;
    }

    .red{
        background-color: red;
    }

    .blue{
        background-color: blue;
    }

    .green{
        background-color: green;
    }

    .yellow{
        background-color: yellow;
    }

    #output{
        margin: 20px;
        font-size: 20px;
        font-weight: bold;
    }

    input{
        padding: 8px;
    }

    button{
        padding: 8px 15px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Hello</h2>

    <div class="boxes">
        <button class="box red" onclick="changeColor('red')"></button>
        <button class="box blue" onclick="changeColor('blue')"></button>
        <button class="box green" onclick="changeColor('green')"></button>
        <button class="box yellow" onclick="changeColor('yellow')"></button>
    </div>

    <p id="output">...</p>

    <input type="text" id="name" placeholder="Enter Name">
    <button onclick="greetUser()">Add</button>
</div>

<script>
    function greetUser() {
        let name = document.getElementById("name").value;
        document.getElementById("output").innerText =
            "Hello, " + name;
    }

    function changeColor(color) {
        document.body.style.backgroundColor = color;
    }
</script>

</body>
</html>
